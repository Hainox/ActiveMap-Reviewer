name: Проверка кода

# Запускается при каждом push и pull request в main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check:
    name: Синтаксис Python + HTML
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Проверить синтаксис Python
        run: |
          echo "=== Проверка reviewer.py ==="
          python -m py_compile reviewer.py && echo "OK: нет синтаксических ошибок"

      - name: Проверить критичные импорты
        run: |
          python - <<'EOF'
          import ast, sys

          with open("reviewer.py", encoding="utf-8") as f:
              source = f.read()

          tree = ast.parse(source)

          # Убедиться что VERSION, PORT, BASE_URL определены
          top_assigns = {
              node.targets[0].id
              for node in ast.walk(tree)
              if isinstance(node, ast.Assign)
              and isinstance(node.targets[0], ast.Name)
          }
          required = {"VERSION", "PORT", "BASE_URL"}
          missing = required - top_assigns
          if missing:
              print(f"ОШИБКА: не найдены переменные: {missing}", file=sys.stderr)
              sys.exit(1)

          print(f"OK: VERSION, PORT, BASE_URL определены")

          # Проверить что PORT — число
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  if getattr(node.targets[0], "id", "") == "PORT":
                      if not isinstance(node.value, ast.Constant):
                          print("ОШИБКА: PORT должен быть числом", file=sys.stderr)
                          sys.exit(1)
          print("OK: PORT корректен")
          EOF

      - name: Проверить HTML структуру
        run: |
          python - <<'EOF'
          import re, sys

          with open("reviewer_html.html", encoding="utf-8") as f:
              html = f.read()

          errors = []

          # Базовые теги
          for tag in ["html", "head", "body", "script"]:
              opens  = len(re.findall(f"<{tag}[ >]", html, re.I))
              closes = len(re.findall(f"</{tag}>", html, re.I))
              if opens != closes:
                  errors.append(f"<{tag}>: открыто {opens}, закрыто {closes}")

          # Критичные ID
          required_ids = [
              "scr-login", "scr-setup", "scr-viewer", "scr-summary",
              "lb", "bug-modal", "app-version",
              "tc-title", "tc-photos", "decision-btns"
          ]
          for id_ in required_ids:
              if f'id="{id_}"' not in html:
                  errors.append(f'Не найден элемент id="{id_}"')

          # Критичные функции
          required_fns = [
              "doLogin", "renderTask", "openLb", "showBugReport", "lbApplyTransform"
          ]
          for fn in required_fns:
              if f"function {fn}" not in html:
                  errors.append(f"Не найдена функция {fn}()")

          if errors:
              print("ОШИБКИ в reviewer_html.html:", file=sys.stderr)
              for e in errors:
                  print(f"  - {e}", file=sys.stderr)
              sys.exit(1)

          size_kb = len(html.encode()) // 1024
          print(f"OK: HTML валиден ({size_kb} КБ, все ID и функции на месте)")
          EOF
